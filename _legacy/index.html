<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Caribbean Hindu Cultural Society — Hindu Temple in South London."
    />
    <title>Caribbean Hindu Cultural Society | Hindu Temple London</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="#home">CHCS</a>
        <button
          type="button"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Open menu"
        >
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About Us</a></li>
            <li><a href="#leadership">EC &amp; Priest</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#visit">Visit</a></li>
            <li><a href="#people">Our people</a></li>
            <li>
              <a
                href="https://www.facebook.com/CHCSLondon/"
                target="_blank"
                rel="noopener noreferrer"
                >Facebook</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section id="home" class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="hero-content">
          <p class="eyebrow" id="bind-hero-eyebrow"></p>
          <h1 id="bind-hero-title"></h1>
          <p class="hero-tagline" id="bind-hero-tagline"></p>
          <blockquote class="gita-quote">
            <p id="bind-hero-quote"></p>
            <cite id="bind-hero-cite"></cite>
          </blockquote>
          <a class="btn btn-primary" id="bind-hero-cta" href="#events"></a>
        </div>
      </section>

      <section id="events" class="section section-events">
        <div class="section-inner">
          <header class="section-header">
            <h2 id="bind-events-title"></h2>
            <p class="lede" id="bind-events-intro"></p>
          </header>
          <ul id="bind-event-cards" class="event-cards"></ul>
        </div>
      </section>

      <section id="about" class="section section-about">
        <div class="section-inner narrow">
          <header class="section-header">
            <h2 id="bind-about-title"></h2>
          </header>
          <article id="bind-about-prose" class="prose"></article>
        </div>
      </section>

      <section id="people" class="section section-people">
        <div class="section-inner">
          <header class="section-header">
            <h2 id="bind-people-title"></h2>
            <div id="bind-people-intro"></div>
          </header>
        </div>
      </section>

      <section id="leadership" class="section section-leadership">
        <div class="section-inner">
          <header class="section-header">
            <h2 id="bind-leadership-title"></h2>
            <p class="lede" id="bind-leadership-intro"></p>
          </header>
          <div id="bind-leadership-grid" class="two-col"></div>
        </div>
      </section>

      <section id="visit" class="section section-visit">
        <div class="section-inner">
          <header class="section-header">
            <h2 id="bind-visit-title"></h2>
          </header>
          <div class="visit-grid">
            <div class="visit-card">
              <h3 id="bind-visit-services-h"></h3>
              <address class="address-block">
                <strong id="bind-address-label"></strong><br />
                <span id="bind-address-lines"></span>
              </address>
              <p>
                <strong id="bind-phone-label"></strong><br />
                <a id="bind-phone-link" href="tel:"></a>
              </p>
              <p>
                <strong id="bind-email-label"></strong><br />
                <a id="bind-email-link" href="mailto:"></a>
              </p>
            </div>
            <div class="visit-card visit-card--accent">
              <h3 id="bind-membership-h"></h3>
              <div id="bind-membership-body"></div>
            </div>
            <div class="visit-card visit-card--wide">
              <h3 id="bind-contact-form-h"></h3>
              <form class="contact-form" id="contact-form" action="#" method="get" novalidate>
                <div class="form-row two">
                  <label>
                    <span id="bind-lbl-first"></span>
                    <input
                      type="text"
                      name="firstName"
                      id="fld-first"
                      autocomplete="given-name"
                      required
                    />
                  </label>
                  <label>
                    <span id="bind-lbl-last"></span>
                    <input
                      type="text"
                      name="lastName"
                      id="fld-last"
                      autocomplete="family-name"
                      required
                    />
                  </label>
                </div>
                <label>
                  <span id="bind-lbl-email"></span>
                  <input type="email" name="email" id="fld-email" autocomplete="email" required />
                </label>
                <label>
                  <span id="bind-lbl-subject"></span>
                  <input type="text" name="subject" id="fld-subject" required />
                </label>
                <label>
                  <span id="bind-lbl-message"></span>
                  <textarea
                    name="body"
                    id="fld-body"
                    rows="5"
                    required
                    placeholder=""
                  ></textarea>
                </label>
                <button type="submit" class="btn btn-primary" id="contact-submit"></button>
                <p class="form-note" id="form-note" hidden></p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p id="bind-footer-line"></p>
        <p class="footer-links">
          <a id="bind-footer-facebook" href="#" target="_blank" rel="noopener noreferrer"></a>
        </p>
      </div>
    </footer>

    <script src="content.js"></script>
    <script src="render.js"></script>
    <script src="main.js"></script>
  </body>
</html>
